<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>UNION ARENA 一人回し</title>

  <script type="module" src="../js/ua_core.js"></script>
  <script type="module" src="../js/ua_solo.js"></script>

  <style>
    body { font-family: sans-serif; margin: 20px; }

    .zone { border: 1px solid #aaa; background: #fafafa; padding: 6px; border-radius: 4px; }

    #ua-board {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    #left-column, #right-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #center-column {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #front-line, #energy-line, #ua-ap, #ua-hand {
      display: flex;
      gap: 6px;
      min-height: 80px;
    }

    /* ライフ（7枚重ね） */
    #ua-life {
      position: relative;
      height: 120px;
    }
    #ua-life .card {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateX(calc(var(--i) * 12px));
    }

    /* 山札・場外・リムーブ（重ね） */
    .stack-zone {
      position: relative;
      height: 120px;
    }
    .stack-zone .card {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateY(calc(var(--i) * 2px));
    }

    .card {
      width: 60px;
      height: 85px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      border: 1px solid #333;
    }

    .line-title { font-weight: bold; margin-bottom: 4px; }
  </style>
</head>

<body>
    <button onclick="location.href='index.html'">← メニューに戻る</button>

<h2>UNION ARENA 一人回し（最小構成）</h2>

<div>
  <label>デッキ選択：</label>
  <select id="deck-list"></select>
  <button id="load-deck">読み込み</button>
</div>

<hr>

<div id="ua-board">

  <!-- 左：ライフ → リムーブ -->
  <div id="left-column">
    <div>
      <div class="line-title">ライフ（7）</div>
      <div id="ua-life" class="zone"></div>
    </div>

    <div>
      <div class="line-title">リムーブ</div>
      <div id="ua-remove" class="zone stack-zone"></div>
    </div>
  </div>

  <!-- 中央：フロント → エナジー → AP → 手札 -->
  <div id="center-column">

    <div>
      <div class="line-title">フロントライン（4）</div>
      <div id="front-line" class="zone"></div>
    </div>

    <div>
      <div class="line-title">エナジーライン（4）</div>
      <div id="energy-line" class="zone"></div>
    </div>

    <div>
      <div class="line-title">AP（3）</div>
      <div id="ua-ap" class="zone"></div>
    </div>

    <div>
      <div class="line-title">手札</div>
      <div id="ua-hand" class="zone"></div>
    </div>

  </div>

  <!-- 右：山札 → 場外 -->
  <div id="right-column">
    <div>
      <div class="line-title">山札</div>
      <div id="ua-deck" class="zone stack-zone"></div>
    </div>

    <div>
      <div class="line-title">場外</div>
      <div id="ua-out" class="zone stack-zone"></div>
    </div>
  </div>

</div>

</body>
</html>

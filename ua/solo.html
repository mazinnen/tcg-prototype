<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>UNION ARENA 一人回し</title>

  <script type="module" src="../js/ua_core.js"></script>
  <script type="module" src="../js/ua_solo.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    /* ===============================
       4 カラムレイアウト
       左：ライフ/リムーブ（細い）
       中央：フロント/エナジー/AP/手札（広い）
       右：山札/場外（細い）
       最右：プレビュー（大）
       =============================== */
    #ua-board {
      display: grid;
      grid-template-columns: 0.7fr 1.6fr 0.7fr 1.3fr;
      gap: 20px;
      margin-top: 20px;
    }

    .zone-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .zone {
      border: 1px solid #aaa;
      background: #fafafa;
      padding: 6px;
      border-radius: 4px;
      position: relative;
      min-height: 120px;
    }

    /* 山札・場外・リムーブ */
    .stack-zone {
      position: relative;
      width: 90px;
      height: 130px;
    }
    .stack-zone .card {
      position: absolute;
      top: 0;
      left: 0;
    }

    /* カード共通 */
    .card {
      width: 80px;
      height: 112px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      border: 1px solid #333;
      cursor: grab;
    }

    /* ライフ */
    #ua-life {
      position: relative;
      width: 200px;
      height: 130px;
    }
    #ua-life .card {
      position: absolute;
    }

    /* フロント・エナジー・AP：等間隔配置 */
    .front-grid,
    .energy-grid,
    .ap-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      height: 130px;
      align-items: center;
      justify-items: start;
    }

    /* AP は 3 枚なので中央寄せ */
    .ap-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    /* 手札 */
    #ua-hand {
      display: flex;
      gap: 6px;
      min-height: 130px;
    }

    /* プレビュー */
    #preview {
      width: 380px;
      height: 500px;
      border: 1px solid #aaa;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    /* peek ダイアログ */
    .peek-dialog {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      padding: 10px;
      display: flex;
      gap: 6px;
      z-index: 9999;
    }
  </style>
</head>

<body>

  <h2>UNION ARENA 一人回し</h2>
  <button onclick="location.href='index.html'">← メニューに戻る</button>

  <div id="deck-select-area">
    <label>デッキ選択：</label>
    <select id="deck-list"></select>
    <button id="load-deck">読み込み</button>
  </div>

  <hr />

  <div id="ua-board">

    <!-- 左 -->
    <div id="left-column">
      <div class="zone-title">ライフ</div>
      <div id="ua-life" class="zone"></div>

      <div class="zone-title">リムーブ</div>
      <div id="ua-remove" class="zone stack-zone"></div>
    </div>

    <!-- 中央 -->
    <div id="center-column">

      <div class="zone-title">フロントライン</div>
      <div id="front-line" class="zone front-grid"></div>

      <div class="zone-title">エナジーライン</div>
      <div id="energy-line" class="zone energy-grid"></div>

      <div class="zone-title">AP</div>
      <div id="ua-ap" class="zone ap-grid"></div>

      <div class="zone-title">手札</div>
      <div id="ua-hand" class="zone"></div>

    </div>

    <!-- 右 -->
    <div id="right-column">
      <div class="zone-title">山札</div>
      <div id="ua-deck" class="zone stack-zone"></div>

      <div class="zone-title">場外</div>
      <div id="ua-out" class="zone stack-zone"></div>
    </div>

    <!-- 最右：プレビュー -->
    <div id="preview-column">
      <div class="zone-title">プレビュー</div>
      <div id="preview"></div>
    </div>

  </div>

</body>
</html>

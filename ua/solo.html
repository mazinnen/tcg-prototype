<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>UNION ARENA 一人回し</title>

  <!-- JS は既存のまま使う想定 -->
  <script type="module" src="../js/ua_core.js"></script>
  <script type="module" src="../js/ua_solo.js"></script>

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    /* 3カラムレイアウト */
    #ua-board {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .zone-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .zone {
      border: 1px solid #aaa;
      background: #fafafa;
      padding: 6px;
      border-radius: 4px;
      position: relative;
    }

    /* 山札・場外・リムーブ：重ねる（山札は裏向き前提） */
    .stack-zone {
      height: 150px;
    }
    .stack-zone .card {
      position: absolute;
      top: 0;
      left: 0;
      transform: none; /* ずらさない */
    }

    /* ライフ：横に少しずつずらして7枚 */
    #ua-life {
      height: 150px;
    }
    #ua-life .card {
      position: absolute;
      top: 0;
      left: calc(var(--i) * 20px); /* JS 側で --i をセットする想定 */
    }

    /* フロントライン・エナジーライン：横並び */
    .line-zone {
      min-height: 180px;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* AP と手札は別ゾーン */
    #ua-ap,
    #ua-hand {
      min-height: 120px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }

    /* カードサイズ */
    .card {
      width: 80px;
      height: 115px;
      background-size: cover;
      background-position: center;
      border-radius: 4px;
      border: 1px solid #333;
    }

    /* デッキ選択UI */
    #deck-select-area {
      margin: 10px 0 20px;
    }
  </style>
</head>
<body>

  <h2>UNION ARENA 一人回し</h2>

  <button onclick="location.href='index.html'">← メニューに戻る</button>

  <div id="deck-select-area">
    <label>デッキ選択：</label>
    <select id="deck-list"></select>
    <button id="load-deck">読み込み</button>
  </div>

  <hr />

  <div id="ua-board">

    <!-- 左：ライフ / リムーブ -->
    <div id="left-column">
      <div class="zone-title">ライフ</div>
      <div id="ua-life" class="zone stack-zone"></div>

      <div class="zone-title">リムーブ</div>
      <div id="ua-remove" class="zone stack-zone"></div>
    </div>

    <!-- 中央：フロントライン / エナジーライン / AP / 手札 -->
    <div id="center-column">

      <div class="zone-title">フロントライン</div>
      <div id="front-line" class="zone line-zone"></div>

      <div class="zone-title">エナジーライン</div>
      <div id="energy-line" class="zone line-zone"></div>

      <div class="zone-title">AP</div>
      <div id="ua-ap" class="zone"></div>

      <div class="zone-title">手札</div>
      <div id="ua-hand" class="zone"></div>

    </div>

    <!-- 右：山札 / 場外 -->
    <div id="right-column">
      <div class="zone-title">山札</div>
      <div id="ua-deck" class="zone stack-zone"></div>

      <div class="zone-title">場外</div>
      <div id="ua-out" class="zone stack-zone"></div>
    </div>

  </div>

</body>
</html>

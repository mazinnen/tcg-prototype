
<head>
  <script type="module" src="../js/ua_deckedit.js"></script>
  
  <style>
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 90px);
      gap: 10px;
    }
    .card-item {
      text-align: center;
      cursor: pointer;
    }
    .card-thumb {
      width: 80px;
      height: 110px;
      background-size: cover;
      border: 1px solid #333;
      border-radius: 4px;
    }
    .deck-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }
    .btn {
      padding: 2px 6px;
    }

#preview-area {
  position: fixed;
  right: 40px;
  top: 120px;
  width: 300px;
  height: 450px;
  border: 1px solid #333;
  background: #fafafa;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#preview-image {
  width: 280px;
  height: 420px;
  background-size: cover;
  background-position: center;
  border-radius: 6px;
  border: 1px solid #333;
}


  </style>
</head>

<button onclick="location.href='index.html'">← メニューに戻る</button>

<h2>UA デッキ編集</h2>

<h3>保存済みデッキ</h3>
<select id="saved-decks"></select>
<button id="load-deck">読み込み</button>

<div>
  <label>デッキ名：</label>
  <input id="deck-name">
</div>

<div>
  <label>作品：</label>
  <select id="work"></select>
</div>

<h3>カード一覧</h3>
<div id="card-list"></div>

<h3>デッキ内容</h3>
<div id="deck-cards"></div>

<div>現在：<span id="deck-count">0 / 50</span></div>

<button id="save">保存</button>

<div id="preview-area">
  <div id="preview-image"></div>
</div>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>UNION ARENA 一人回し</title>

  <script src="../js/db.js"></script>
  <script src="../js/deck.js"></script>
  <script src="../js/core.js"></script>
  <script src="../js/loaders.js"></script>

  <script type="module" src="solo_main.js"></script>

  <style>
    body { font-family: sans-serif; margin: 20px; }

    .zone {
      border: 1px solid #aaa;
      background: #fafafa;
      border-radius: 4px;
      padding: 6px;
      min-height: 70px;
    }

    /* 盤面全体：3カラム構成 */
    #ua-board {
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    /* 左カラム（ライフ → リムーブ） */
    #left-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 右カラム（山札 → 場外） */
    #right-column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 中央カラム（フロント → エナジー → AP → 手札） */
    #center-column {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* フロントライン・エナジーラインは横並び4枚 */
    #front-line, #energy-line {
      display: flex;
      gap: 6px;
      min-height: 100px;
    }

    /* AP は3枚横並び */
    #ua-ap {
      display: flex;
      gap: 6px;
      min-height: 60px;
    }

    /* 手札は横並び */
    #ua-hand {
      display: flex;
      gap: 6px;
      min-height: 100px;
    }

    /* ライフは7枚を少しずつズラして重ねる */
    #ua-life {
      position: relative;
      height: 120px;
    }
    #ua-life .card {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateX(calc(var(--i) * 12px));
    }

    /* 山札・場外・リムーブは重ねて表示 */
    .stack-zone {
      position: relative;
      height: 120px;
    }
    .stack-zone .card {
      position: absolute;
      top: 0;
      left: 0;
      transform: translateY(calc(var(--i) * 2px));
    }

    .line-title { font-weight: bold; margin-bottom: 4px; }
  </style>
</head>

<body>

<h2>UNION ARENA 一人回しモード</h2>

<div>
  <label>作品：</label>
  <select id="work-list"></select>
</div>

<div>
  <label>デッキ：</label>
  <select id="deck-list"></select>
  <button id="load-deck">読み込み</button>
</div>

<hr>

<div id="ua-board">

  <!-- 左：ライフ → リムーブ -->
  <div id="left-column">
    <div>
      <div class="line-title">ライフ（7）</div>
      <div id="ua-life" class="zone"></div>
    </div>

    <div>
      <div class="line-title">リムーブ</div>
      <div id="ua-remove" class="zone stack-zone"></div>
    </div>
  </div>

  <!-- 中央：フロント → エナジー → AP → 手札 -->
  <div id="center-column">

    <div>
      <div class="line-title">フロントライン（4）</div>
      <div id="front-line" class="zone"></div>
    </div>

    <div>
      <div class="line-title">エナジーライン（4）</div>
      <div id="energy-line" class="zone"></div>
    </div>

    <div>
      <div class="line-title">AP（3）</div>
      <div id="ua-ap" class="zone"></div>
    </div>

    <div>
      <div class="line-title">手札</div>
      <div id="ua-hand" class="zone"></div>
    </div>

  </div>

  <!-- 右：山札 → 場外 -->
  <div id="right-column">
    <div>
      <div class="line-title">山札</div>
      <div id="ua-deck" class="zone stack-zone"></div>
    </div>

    <div>
      <div class="line-title">場外</div>
      <div id="ua-out" class="zone stack-zone"></div>
    </div>
  </div>

</div>

</body>
</html>

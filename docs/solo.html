<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TCG Prototype</title>
    <link rel="stylesheet" href="css/layout.css" />
  </head>

  <body>
    <h2>一人回しモード</h2>

    <div id="board-wrapper">
      <div id="my-area">
        <!-- 左列 -->
        <div id="my-yellow" class="zone yellow-zone">
          <div class="zone-label">イエロー</div>
          <div class="zone-count" id="my-yellow-count">0</div>
        </div>

        <div id="my-red" class="zone red-zone">
          <div class="zone-label">レッド</div>
          <div class="zone-count" id="my-red-count">0</div>
        </div>

        <div id="my-remove" class="zone">
          <div class="zone-label">リムーブ</div>
          <div class="zone-count" id="my-remove-count">0</div>
        </div>

        <!-- 中央列 -->
        <div id="my-field" class="zone field">
          <div class="zone-label">フィールド</div>
        </div>

        <div id="my-energy" class="zone">
          <div class="zone-label">エナジー</div>
          <div class="zone-count" id="my-energy-count">0</div>
        </div>

        <!-- 右列 -->
        <div id="my-territory" class="zone">
          <div class="zone-label">テリトリー</div>
        </div>

        <div id="my-deck" class="zone">
          <div class="zone-label">山札</div>
          <div class="zone-count" id="my-deck-count">40</div>
        </div>

        <div id="my-drop" class="zone">
          <div class="zone-label">ドロップ</div>
          <div class="zone-count" id="my-drop-count">0</div>
        </div>

        <!-- 下段（手札） -->
        <div id="my-hand" class="zone hand">
          <div class="zone-label">手札</div>
          <div class="zone-count" id="my-hand-count">0</div>
        </div>
      </div>

      <!-- 右側：カード詳細エリア -->
      <div id="card-detail">
        <div class="detail-title">カード情報</div>
        <div class="detail-image"></div>
        <div class="detail-text">カードテキスト</div>

        <!-- 右側：デッキ選択エリア -->
        <div id="work-select">
          <label>作品：</label>
          <select id="work-list"></select>
        </div>
        <div id="deck-select">
          <label>デッキ：</label>
          <select id="deck-list"></select>
        </div>
        <button id="load-deck">デッキ読み込み</button>

        <div id="battle-start-area">
          <button id="btn-mulligan">マリガン</button>
          <button id="btn-start">対戦開始</button>
        </div>
      </div>
    </div>

    <!-- ▼ 重なり一覧ダイアログ -->
    <div id="stack-dialog" class="dialog hidden">
      <div class="dialog-inner">
        <div class="dialog-title">カード一覧</div>
        <div id="stack-list" class="stack-list"></div>
        <button id="stack-close">閉じる</button>
      </div>
    </div>

    <!-- ▼ 山札確認ダイアログ -->
    <div id="deck-peek-dialog" class="dialog hidden">
      <div class="dialog-inner">
        <div class="dialog-title">山札の上から確認</div>
        <div id="deck-peek-list" class="stack-list"></div>
        <div class="dialog-buttons">
          <button id="deck-peek-top">上に戻す</button>
          <button id="deck-peek-bottom">下に戻す</button>
          <button id="deck-peek-close">閉じる</button>
        </div>
      </div>
    </div>

  <script src="js/db.js"></script>
  <script src="js/deck_manager.js"></script>

  <script src="js/core.js"></script>
  <script src="js/deck.js"></script>
  <script src="js/dialog_stack.js"></script>
  <script src="js/dialog_peek.js"></script>

  <script src="js/solo.js"></script>
  </body>
</html>

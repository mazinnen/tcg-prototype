<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>BDB デッキ編集</title>
  
  <link rel="stylesheet" href="../css/bdb_deckedit.css" />

  <script type="module" src="../js/bdb/bdb_core.js"></script>
  <script type="module" src="../js/bdb/bdb_deckedit.js"></script>
</head>

<body>
  <h2>BDB デッキ編集</h2>
  <button onclick="location.href='index.html'">← メニューに戻る</button>

  <div id="editor">

    <!-- 左：カード検索 -->
    <div id="left-panel">
      <h3>カード検索</h3>

      <label>作品</label>
      <select id="work-select"></select>

      <div id="card-list"></div>
    </div>

    <!-- 右：デッキ -->
    <div id="right-panel">
      <h3>デッキ内容 <span id="deck-count">0</span> 枚</h3>

      <label>デッキ名</label>
      <input id="deck-name" type="text" />

      <label>テリトリー</label>
      <select id="territory-select"></select>

      <label>保存済みデッキ</label>
      <select id="saved-decks"></select>
      <button id="load-deck">読み込み</button>
      <button id="delete-deck">削除</button>
      <button id="save-deck">保存</button>

      <div id="deck-cards"></div>

    </div>

  </div>

  <!-- プレビュー -->
  <!-- <div id="preview"></div> -->

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>UA デッキ編集</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    #layout {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1.6fr;
      gap: 16px;
      margin-top: 16px;
    }
    #card-list, #deck-cards {
      height: 500px;
      overflow-y: auto;
      border: 1px solid #aaa;
      padding: 4px;
      width: 100%;
    }
    .card-item, .deck-card-item {
      display: flex;
      gap: 8px;
      padding: 4px;
      border-bottom: 1px solid #eee;
      align-items: center;
      cursor: pointer;
    }
    .card-thumb {
      width: 50px;
      height: 70px;
      background-size: cover;
      background-position: center;
      border: 1px solid #333;
    }
    #preview {
      border: 1px solid #aaa;
      width: 100%;
      height: 420px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }
  </style>
</head>
<body>
  <button onclick="location.href='index.html'">← メニューに戻る</button>

  <h2>UA デッキ編集</h2>

  <div>
    <label>デッキ名：</label>
    <input id="deck-name" type="text" />
    <label>作品：</label>
    <select id="work">
      <option value="">すべて</option>
    </select>
  </div>

  <div>
    <button id="save-deck">保存</button>
    <button id="delete-deck">削除</button>

    <label>保存済みデッキ：</label>
    <select id="saved-decks"></select>
    <button id="load-deck">読み込み</button>
  </div>

  <div id="layout">
    <div>
      <h3>カード一覧（GAS）</h3>
      <div id="card-list"></div>
    </div>
    <div>
      <h3>デッキ内容 <span id="deck-count">0 / 50</span></h3>
      <div id="deck-cards"></div>
    </div>
    <div>
      <h3>カード拡大表示</h3>
      <div id="preview"></div>
    </div>
  </div>

  <script type="module" src="../js/db.js"></script>
  <script type="module" src="../js/ua_deckedit.js"></script>
</body>
</html>

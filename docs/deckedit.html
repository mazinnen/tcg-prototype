<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>デッキ編集</title>

  <!-- まず通常スクリプトを読み込む（順番重要） -->
  <script src="js/db.js"></script>
  <script src="js/deck_manager.js"></script>
  <script src="js/loaders.js"></script>

  <!-- deckedit.js だけ ES Module -->
  <script type="module" src="js/deckedit.js"></script>
</head>
<body>

<h2>デッキ編集</h2>

<div>
  <label>作品：</label>
  <select id="work-select"></select>
</div>

<div>
  <label>デッキ一覧：</label>
  <select id="deck-list"></select>
  <button id="new-deck-btn">新規デッキ</button>
  <button id="delete-deck-btn">削除</button>
</div>

<hr>

<div>
  <label>デッキ名：</label>
  <input id="deck-name" type="text">
</div>

<div>
  <label>テリトリー：</label>
  <select id="territory-select"></select>
</div>
<hr>

<!-- <h3>カード追加</h3>
<div>
  <input id="card-id-input" placeholder="カードID (例: BTR-001)">
  <input id="card-count-input" type="number" value="1" min="1">
  <button id="add-card-btn">追加</button>
</div> -->

<h3>カード一覧から追加</h3>

<div>
  <label>検索：</label>
  <input id="card-search" placeholder="カード名 or ID">
</div>

<div id="card-list-panel" style="max-height:300px; overflow-y:auto; border:1px solid #ccc; padding:5px;">
  <!-- カード一覧がここに表示される -->
</div>

<h3>カード一覧</h3>
<table border="1">
  <thead>
    <tr><th>ID</th><th>名前</th><th>枚数</th><th>削除</th></tr>
  </thead>
  <tbody id="card-table"></tbody>
</table>

<hr>

<button id="save-deck-btn">保存</button>
</body>
</html>

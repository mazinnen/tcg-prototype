<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>デッキ編集</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .row { margin-bottom: 12px; }
    textarea { width: 100%; height: 200px; }
    select { width: 300px; padding: 6px; }
    button { padding: 6px 12px; margin-right: 6px; }
  </style>
</head>
<body>
<h3>作品の管理</h3>

<div class="row">
  <label>作品ID：</label>
  <input id="new-work-id" type="text">
</div>

<div class="row">
  <label>作品名：</label>
  <input id="new-work-name" type="text">
</div>

<div class="row">
  <button id="btn-work-add">作品を追加</button>
  <button id="btn-work-delete">作品を削除</button>
</div>

<h2>デッキ編集</h2>

<div class="row">
  <label>作品を選択：</label>
  <select id="work-list"></select>
</div>

<div class="row">
  <label>デッキを選択：</label>
  <select id="deck-list"></select>
</div>

<div class="row">
  <label>デッキ名：</label>
  <input id="deck-name" type="text" style="width:300px;">
</div>

<div class="row">
  <label>デッキ JSON：</label>
  <textarea id="deck-json"></textarea>
</div>

<div class="row">
  <button id="btn-new">新規登録</button>
  <button id="btn-load">読み込み</button>
  <button id="btn-save">保存</button>
  <button id="btn-delete">削除</button>
</div>

<script src="js/db.js"></script>
<script src="js/deck_manager.js"></script>

<script>
/* ---------------------------------------------------------
   初期化
--------------------------------------------------------- */
window.addEventListener("DOMContentLoaded", async () => {
  await openDB();
  await initWorkAndDeckUI();
});

/* ---------------------------------------------------------
   新規登録
--------------------------------------------------------- */
document.getElementById("btn-new").addEventListener("click", async () => {
  const workId = document.getElementById("work-list").value;
  const name = document.getElementById("deck-name").value;
  const jsonText = document.getElementById("deck-json").value;

  if (!name) {
    alert("デッキ名を入力してください");
    return;
  }

  let data;
  try {
    data = JSON.parse(jsonText);
  } catch (e) {
    alert("JSON が不正です");
    return;
  }

  await addDeck(workId, name, data);

  alert("新規デッキを登録しました");

  // デッキ一覧を更新
  await updateDeckListUI(workId);
});

/* ---------------------------------------------------------
   デッキ読み込み
--------------------------------------------------------- */
document.getElementById("btn-load").addEventListener("click", async () => {
  const deckId = document.getElementById("deck-list").value;
  if (!deckId) return;

  const deck = await dbGet("decks", deckId);
  if (!deck) return;

  document.getElementById("deck-name").value = deck.name;
  document.getElementById("deck-json").value = JSON.stringify(deck.data, null, 2);
});

/* ---------------------------------------------------------
   デッキ保存
--------------------------------------------------------- */
document.getElementById("btn-save").addEventListener("click", async () => {
  const workId = document.getElementById("work-list").value;
  const deckId = document.getElementById("deck-list").value;
  if (!deckId) return;
  const name = document.getElementById("deck-name").value;
  const jsonText = document.getElementById("deck-json").value;

  let data;
  try {
    data = JSON.parse(jsonText);
  } catch (e) {
    alert("JSON が不正です");
    return;
  }

  await dbPut("decks", { deckId, workId, name, data });
  alert("保存しました");

  updateDeckListUI(workId);
});

/* ---------------------------------------------------------
   デッキ削除
--------------------------------------------------------- */
document.getElementById("btn-delete").addEventListener("click", async () => {
  const deckId = document.getElementById("deck-list").value;
  if (!deckId) return;

  if (!confirm("本当に削除しますか？")) return;

  await dbDelete("decks", deckId);

  alert("削除しました");

  const workId = document.getElementById("work-list").value;
  updateDeckListUI(workId);

  document.getElementById("deck-name").value = "";
  document.getElementById("deck-json").value = "";
});

/* ---------------------------------------------------------
   作品追加
--------------------------------------------------------- */
document.getElementById("btn-work-add").addEventListener("click", async () => {
  const id = document.getElementById("new-work-id").value;
  const name = document.getElementById("new-work-name").value;

  if (!id || !name) {
    alert("ID と名前を入力してください");
    return;
  }

  await dbPut("works", { id, name });

  alert("作品を追加しました");

  initWorkAndDeckUI();
});

/* ---------------------------------------------------------
   作品削除
--------------------------------------------------------- */
document.getElementById("btn-work-delete").addEventListener("click", async () => {
  const id = document.getElementById("new-work-id").value;

  if (!id) {
    alert("作品IDを入力してください");
    return;
  }

  await dbDelete("works", id);

  alert("作品を削除しました");

  initWorkAndDeckUI();
});

</script>

</body>
</html>

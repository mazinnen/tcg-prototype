<!DOCTYPE html>
<html>
  <body>
    <h2>TCG Prototype</h2>

    <!-- 相手側 -->
    <div id="opponent-area" class="player-area opponent">
      <div class="row">
        <div id="op-territory" class="zone">相手テリトリー</div>
        <div id="op-field" class="zone">相手フィールド</div>
        <div id="op-deck" class="zone">相手山札</div>
      </div>
      <div class="row">
        <div id="op-energy" class="zone">相手エナジー</div>
        <div id="op-drop" class="zone">相手ドロップ</div>
        <div id="op-remove" class="zone">相手リムーブ</div>
      </div>
      <div class="row">
        <div id="op-yellow" class="zone life">相手イエロー</div>
        <div id="op-red" class="zone life">相手レッド</div>
      </div>
    </div>

    <hr>

    <!-- 自分側 -->
    <div id="my-area" class="player-area">
      <div class="row">
        <div id="my-territory" class="zone">テリトリー</div>
        <div id="my-field" class="zone">フィールド</div>
        <div id="my-deck" class="zone">山札</div>
      </div>
      <div class="row">
        <div id="my-energy" class="zone">エナジー</div>
        <div id="my-drop" class="zone">ドロップ</div>
        <div id="my-remove" class="zone">リムーブ</div>
      </div>
      <div class="row">
        <div id="my-yellow" class="zone life">イエロー</div>
        <div id="my-red" class="zone life">レッド</div>
      </div>
    </div>

    <style>
      .player-area {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .zone {
        width: 200px;
        height: 120px;
        border: 2px solid #444;
        position: relative;
        padding: 5px;
        background: #f5f5f5;
      }

      .life {
        width: 150px;
        height: 80px;
        background: #fff7cc;
      }

      /* 相手側を180°回転 */
      .opponent {
        transform: rotate(180deg);
      }

      /* 相手側のカードは正位置に戻す */
      .opponent .card {
        transform: rotate(180deg);
      }

      .card {
        width: 80px;
        height: 120px;
        background: #ccc;
        position: absolute;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }
    </style>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="client.js"></script>
  </body>
</html>

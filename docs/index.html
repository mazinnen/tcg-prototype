<!DOCTYPE html>
<html>
  <body>
    <h2>TCG Prototype</h2>

    <div id="zones" style="display:flex;gap:20px;margin-top:20px;">
      <div id="deck" class="zone">山札</div>
      <div id="hand" class="zone">手札</div>
      <div id="field" class="zone">場</div>
    </div>

    <style>
      .zone {
        width: 200px;
        height: 150px;
        border: 2px solid #444;
        position: relative;
        padding: 5px;
      }
      .card {
        width: 80px;
        height: 120px;
        background: #ccc;
        position: absolute;
        cursor: grab;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }
    </style>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="client.js"></script>
  </body>
</html>

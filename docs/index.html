<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TCG Simple</title>
    <style>
      .zone {
        width: 300px;
        height: 200px;
        border: 2px solid #444;
        margin: 20px;
        padding: 10px;
        position: relative;
      }
      .card {
        width: 60px;
        height: 90px;
        border: 2px solid #333;
        border-radius: 6px;
        background: gray;
        position: absolute;
      }
      #hand .card {
        background: blue;
      }
    </style>
  </head>

  <body>
    <h2>TCG Simple</h2>

    <div id="deck" class="zone">山札</div>
    <div id="hand" class="zone">手札</div>

    <script src="main.js"></script>
  </body>
</html>
